<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TremorSense</title>
  <link rel="stylesheet" href="css/modern-ui.css">
</head>
<body>
  <div class="modern-popup">
    <!-- Geometric Background Shapes -->
    <div class="geometric-bg">
      <div class="shape-circle"></div>
      <div class="shape-triangle"></div>
      <div class="shape-square"></div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <!-- Header -->
      <div class="modern-header">
        <div class="logo-container">
          <img src="images/tremorsense-logo.png" alt="TremorSense" class="app-logo">
          <!-- Fallback if image doesn't load -->
          <div class="logo-fallback">
            <svg viewBox="0 0 200 80" class="logo-svg">
              <text x="10" y="50" fill="#8B2635" font-family="Arial" font-size="32" font-weight="300">Tremor</text>
              <text x="110" y="50" fill="#1A1A1A" font-family="Arial" font-size="32" font-weight="600">Sense</text>
            </svg>
          </div>
        </div>
        <p class="app-tagline">Intelligent tremor detection & assistance</p>
      </div>

      <!-- Main Toggle -->
      <button class="hero-toggle" id="toggleBtn">
        <span class="toggle-text">Enable Accessibility</span>
      </button>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="accuracyValue">--%</div>
          <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="assistsValue">0</div>
          <div class="stat-label">AI Assists</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="missesValue">0</div>
          <div class="stat-label">Prevented</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="adaptValue">0</div>
          <div class="stat-label">Adaptations</div>
        </div>
      </div>

      <!-- Settings Section -->
      <div class="settings-section">
        <h3 class="section-title">Controls</h3>

        <!-- Sensitivity Slider -->
        <div class="control-item">
          <div class="control-label">
            <span class="control-name">Cursor Sensitivity</span>
            <span class="control-value" id="sensitivityValue">50%</span>
          </div>
          <input type="range" class="modern-slider" id="sensitivitySlider" min="10" max="100" value="50">
        </div>

        <!-- Magnetic Strength Slider -->
        <div class="control-item">
          <div class="control-label">
            <span class="control-name">Magnetic Strength</span>
            <span class="control-value" id="magneticValue">70%</span>
          </div>
          <input type="range" class="modern-slider" id="magneticSlider" min="0" max="100" value="70">
        </div>

        <!-- Target Enlargement Slider -->
        <div class="control-item">
          <div class="control-label">
            <span class="control-name">Target Enlargement</span>
            <span class="control-value" id="enlargeValue">1.5x</span>
          </div>
          <input type="range" class="modern-slider" id="enlargeSlider" min="100" max="280" value="150">
        </div>

        <!-- Checkboxes -->
        <label class="modern-checkbox">
          <input type="checkbox" class="checkbox-input" id="autoAdapt" checked>
          <span class="checkbox-box"></span>
          <span class="checkbox-label">Auto-adapt to tremor</span>
        </label>

        <label class="modern-checkbox">
          <input type="checkbox" class="checkbox-input" id="aiSidebar" checked>
          <span class="checkbox-box"></span>
          <span class="checkbox-label">Show AI Control Summary</span>
        </label>

        <!-- Analytics Dashboard Link -->
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #E5E5E7;">
          <button id="openAnalytics" style="
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8B2635 0%, #A8312F 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
          ">
            📊 Open Analytics Dashboard
          </button>
        </div>

        <!-- Creator Hub -->
    <div class="creator-hub" id="creatorHub">
      <h3>Creator Hub</h3>
      <!-- Buttons will be injected via popup.js -->
    </div>
      </div>
    </div>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
