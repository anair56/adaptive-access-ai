<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Access AI - Live Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom Cursor */
    #custom-cursor {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transition: all 0.1s ease;
      transform: translate(-50%, -50%);
    }

    #custom-cursor.tremor {
      animation: shake 0.1s infinite;
    }

    #custom-cursor.ai-assisted {
      border-color: #00ff88;
      box-shadow: 0 0 20px #00ff88;
    }

    #cursor-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes shake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(-48%, -52%) rotate(-5deg); }
      50% { transform: translate(-52%, -48%) rotate(5deg); }
      75% { transform: translate(-48%, -52%) rotate(-5deg); }
    }

    /* Main Layout */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0a0e27 0%, #000 70%);
      position: relative;
    }

    .hero-content {
      text-align: center;
      z-index: 10;
    }

    .hero h1 {
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #00ff88 50%, #f43f5e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -2px;
    }

    .hero p {
      font-size: 1.5rem;
      color: #888;
      margin-bottom: 3rem;
    }

    /* Split Screen Demo */
    .demo-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      position: relative;
    }

    .demo-side {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .demo-side.without-ai {
      background: linear-gradient(135deg, #1a0000 0%, #000 100%);
      border-right: 1px solid #333;
    }

    .demo-side.with-ai {
      background: linear-gradient(135deg, #001a0a 0%, #000 100%);
    }

    .demo-title {
      position: absolute;
      top: 2rem;
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .without-ai .demo-title {
      color: #ff4444;
    }

    .with-ai .demo-title {
      color: #00ff88;
    }

    /* Simulated UI */
    .fake-ui {
      width: 400px;
      background: #111;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .fake-navbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .nav-btn {
      padding: 4px 8px;
      background: #222;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: #333;
      color: #fff;
    }

    .with-ai .nav-btn {
      padding: 8px 16px;
      font-size: 14px;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 2rem 0;
    }

    .action-btn {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 1px solid #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #aaa;
      cursor: pointer;
      position: relative;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
      transform: scale(1.05);
    }

    .with-ai .action-btn {
      font-size: 14px;
      padding: 1rem;
    }

    .with-ai .action-btn::after {
      content: '';
      position: absolute;
      inset: -10px;
      border: 2px dashed rgba(0, 255, 136, 0.2);
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .with-ai .action-btn:hover::after {
      opacity: 1;
    }

    /* Magnetic Effect Visualization */
    .magnetic-field {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.2) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      transform: translate(-50%, -50%);
    }

    .with-ai .magnetic-field.active {
      opacity: 1;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Stats Overlay */
    .stats-overlay {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 1.5rem 3rem;
      border-radius: 100px;
      border: 1px solid #333;
      display: flex;
      gap: 3rem;
      z-index: 100;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Control Panel */
    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      z-index: 100;
    }

    .control-btn {
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 100px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .control-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    .control-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
    }

    /* Hermes Terminal */
    .hermes-terminal {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 400px;
      height: 300px;
      background: rgba(0,0,0,0.95);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1rem;
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      overflow-y: auto;
      z-index: 50;
    }

    .terminal-header {
      color: #00ff88;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .terminal-line {
      color: #888;
      margin: 0.5rem 0;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .function-call {
      color: #667eea;
      font-weight: bold;
    }

    .function-result {
      color: #00ff88;
    }

    /* Particle Effects */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00ff88;
      border-radius: 50%;
      opacity: 0;
    }

    /* Success Animation */
    .success-ripple {
      position: fixed;
      width: 100px;
      height: 100px;
      border: 3px solid #00ff88;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      animation: ripple 1s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(3);
        opacity: 0;
      }
    }

    /* Start Screen */
    .start-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s;
    }

    .start-btn {
      padding: 1.5rem 4rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>
  <canvas id="cursor-trail"></canvas>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <h1 style="font-size: 4rem; margin-bottom: 2rem; background: linear-gradient(135deg, #667eea 0%, #00ff88 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      Adaptive Access AI
    </h1>
    <p style="color: #888; font-size: 1.2rem; margin-bottom: 3rem;">
      Experience the future of motor accessibility
    </p>
    <button class="start-btn" onclick="startDemo()">Start Demo</button>
  </div>

  <!-- Stats Overlay -->
  <div class="stats-overlay" style="display: none;" id="statsOverlay">
    <div class="stat">
      <div class="stat-value" id="accuracyStat">0%</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="missStat">0</div>
      <div class="stat-label">Misses</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="hermesCallsStat">0</div>
      <div class="stat-label">Hermes Calls</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timeSavedStat">0s</div>
      <div class="stat-label">Time Saved</div>
    </div>
  </div>

  <!-- Demo Container -->
  <div class="demo-container" style="display: none;" id="demoContainer">
    <!-- Without AI Side -->
    <div class="demo-side without-ai">
      <div class="demo-title">Without Hermes AI</div>
      <div class="fake-ui">
        <div class="fake-navbar">
          <button class="nav-btn" onclick="clickButton(this, false)">File</button>
          <button class="nav-btn" onclick="clickButton(this, false)">Edit</button>
          <button class="nav-btn" onclick="clickButton(this, false)">View</button>
          <button class="nav-btn" onclick="clickButton(this, false)">Tools</button>
        </div>
        <h3 style="color: #fff; margin-bottom: 1rem;">Quick Actions</h3>
        <div class="action-buttons">
          <button class="action-btn" onclick="clickButton(this, false)">Save</button>
          <button class="action-btn" onclick="clickButton(this, false)">Open</button>
          <button class="action-btn" onclick="clickButton(this, false)">Copy</button>
          <button class="action-btn" onclick="clickButton(this, false)">Cut</button>
          <button class="action-btn" onclick="clickButton(this, false)">Paste</button>
          <button class="action-btn" onclick="clickButton(this, false)">Delete</button>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 2rem;">
          <button class="nav-btn" style="flex: 1;" onclick="clickButton(this, false)">Cancel</button>
          <button class="nav-btn" style="flex: 1; background: #1a4d2e;" onclick="clickButton(this, false)">Submit</button>
        </div>
      </div>
    </div>

    <!-- With AI Side -->
    <div class="demo-side with-ai">
      <div class="demo-title">With Hermes AI</div>
      <div class="magnetic-field" id="magneticField"></div>
      <div class="fake-ui">
        <div class="fake-navbar">
          <button class="nav-btn" onclick="clickButton(this, true)">File</button>
          <button class="nav-btn" onclick="clickButton(this, true)">Edit</button>
          <button class="nav-btn" onclick="clickButton(this, true)">View</button>
          <button class="nav-btn" onclick="clickButton(this, true)">Tools</button>
        </div>
        <h3 style="color: #fff; margin-bottom: 1rem;">Quick Actions</h3>
        <div class="action-buttons">
          <button class="action-btn" onclick="clickButton(this, true)">Save</button>
          <button class="action-btn" onclick="clickButton(this, true)">Open</button>
          <button class="action-btn" onclick="clickButton(this, true)">Copy</button>
          <button class="action-btn" onclick="clickButton(this, true)">Cut</button>
          <button class="action-btn" onclick="clickButton(this, true)">Paste</button>
          <button class="action-btn" onclick="clickButton(this, true)">Delete</button>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 2rem;">
          <button class="nav-btn" style="flex: 1;" onclick="clickButton(this, true)">Cancel</button>
          <button class="nav-btn" style="flex: 1; background: #1a4d2e;" onclick="clickButton(this, true)">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hermes Terminal -->
  <div class="hermes-terminal" style="display: none;" id="hermesTerminal">
    <div class="terminal-header">
      <span style="color: #00ff88;">●</span> Hermes Function Calls
    </div>
    <div id="terminalContent"></div>
  </div>

  <!-- Controls -->
  <div class="controls" style="display: none;" id="controls">
    <button class="control-btn" id="tremorBtn" onclick="toggleTremor()">Enable Tremor</button>
    <button class="control-btn" onclick="resetDemo()">Reset Demo</button>
  </div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <script>
    // Global state
    let tremorEnabled = false;
    let stats = {
      totalClicks: 0,
      successfulClicks: 0,
      missClicks: 0,
      hermesCalls: 0,
      timeSaved: 0
    };

    // Custom cursor
    const cursor = document.getElementById('custom-cursor');
    const cursorTrail = document.getElementById('cursor-trail');
    const ctx = cursorTrail.getContext('2d');

    // Set canvas size
    cursorTrail.width = window.innerWidth;
    cursorTrail.height = window.innerHeight;

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;
    let trail = [];

    // Mouse movement
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      // Add to trail
      trail.push({ x: mouseX, y: mouseY, time: Date.now() });
      if (trail.length > 20) trail.shift();
    });

    // Animate cursor
    function animateCursor() {
      // Smooth cursor movement
      const speed = 0.15;
      cursorX += (mouseX - cursorX) * speed;
      cursorY += (mouseY - cursorY) * speed;

      // Apply tremor if enabled
      if (tremorEnabled) {
        const tremorX = (Math.random() - 0.5) * 8;
        const tremorY = (Math.random() - 0.5) * 8;
        cursor.style.left = (cursorX + tremorX) + 'px';
        cursor.style.top = (cursorY + tremorY) + 'px';
      } else {
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';
      }

      // Draw trail
      ctx.clearRect(0, 0, cursorTrail.width, cursorTrail.height);
      ctx.strokeStyle = tremorEnabled ? 'rgba(255, 68, 68, 0.3)' : 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      trail.forEach((point, i) => {
        if (i === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();

      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Start demo
    function startDemo() {
      document.getElementById('startScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('demoContainer').style.display = 'grid';
        document.getElementById('statsOverlay').style.display = 'flex';
        document.getElementById('hermesTerminal').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';

        // Auto-enable tremor after 2 seconds
        setTimeout(() => {
          toggleTremor();
          addTerminalLine('🚀 Demo started - tremor simulation active');
        }, 2000);
      }, 1000);
    }

    // Toggle tremor
    function toggleTremor() {
      tremorEnabled = !tremorEnabled;
      const btn = document.getElementById('tremorBtn');
      btn.textContent = tremorEnabled ? 'Disable Tremor' : 'Enable Tremor';
      btn.classList.toggle('active', tremorEnabled);
      cursor.classList.toggle('tremor', tremorEnabled);

      addTerminalLine(tremorEnabled
        ? '⚠️ Tremor simulation enabled (6Hz frequency detected)'
        : '✓ Tremor simulation disabled');
    }

    // Handle button clicks
    function clickButton(button, withAI) {
      const startTime = Date.now();

      // Simulate miss chance with tremor
      if (tremorEnabled && !withAI && Math.random() > 0.4) {
        // Miss click
        stats.missClicks++;
        stats.totalClicks++;
        showMissClick(button);
        addTerminalLine('❌ Miss-click detected near: ' + button.textContent);
      } else {
        // Successful click
        stats.successfulClicks++;
        stats.totalClicks++;

        if (withAI && tremorEnabled) {
          // Show AI assistance
          showMagneticEffect(button);
          simulateHermesCalls(button);
          stats.timeSaved += 2;
          cursor.classList.add('ai-assisted');
          setTimeout(() => cursor.classList.remove('ai-assisted'), 500);
        }

        // Visual feedback
        button.style.background = 'linear-gradient(135deg, #00ff88 0%, #00cc6a 100%)';
        setTimeout(() => {
          button.style.background = '';
        }, 300);

        showSuccessClick(button);
      }

      updateStats();
    }

    // Show magnetic effect
    function showMagneticEffect(element) {
      const rect = element.getBoundingClientRect();
      const field = document.getElementById('magneticField');
      field.style.left = rect.left + rect.width / 2 + 'px';
      field.style.top = rect.top + rect.height / 2 + 'px';
      field.classList.add('active');
      setTimeout(() => field.classList.remove('active'), 1000);
    }

    // Simulate Hermes function calls
    function simulateHermesCalls(element) {
      stats.hermesCalls++;

      const functions = [
        'adjustCursorSensitivity(0.3, 100)',
        'addMagneticSnap("' + element.textContent + '", 75)',
        'enlargeClickTarget("button", 1.5)'
      ];

      functions.forEach((func, i) => {
        setTimeout(() => {
          addTerminalLine(`<span class="function-call">hermes.${func}</span>`);
          setTimeout(() => {
            addTerminalLine(`<span class="function-result">✓ Applied successfully</span>`);
          }, 200);
        }, i * 300);
      });
    }

    // Terminal output
    function addTerminalLine(text) {
      const terminal = document.getElementById('terminalContent');
      const line = document.createElement('div');
      line.className = 'terminal-line';
      line.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;

      // Limit lines
      if (terminal.children.length > 20) {
        terminal.removeChild(terminal.firstChild);
      }
    }

    // Visual feedback
    function showSuccessClick(element) {
      const rect = element.getBoundingClientRect();
      const ripple = document.createElement('div');
      ripple.className = 'success-ripple';
      ripple.style.left = rect.left + rect.width / 2 + 'px';
      ripple.style.top = rect.top + rect.height / 2 + 'px';
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1000);

      // Add particles
      createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
    }

    function showMissClick(element) {
      const rect = element.getBoundingClientRect();
      const indicator = document.createElement('div');
      indicator.style.cssText = `
        position: fixed;
        left: ${rect.left + rect.width / 2 - 15}px;
        top: ${rect.top + rect.height / 2 - 15}px;
        width: 30px;
        height: 30px;
        border: 2px solid #ff4444;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10000;
        animation: ripple 0.5s ease-out forwards;
      `;
      document.body.appendChild(indicator);
      setTimeout(() => indicator.remove(), 500);
    }

    // Particle effects
    function createParticles(x, y) {
      const container = document.getElementById('particles');
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';

        const angle = (Math.PI * 2 / 8) * i;
        const velocity = 100 + Math.random() * 50;

        particle.style.animation = `particle-move 1s ease-out forwards`;
        particle.style.setProperty('--dx', Math.cos(angle) * velocity + 'px');
        particle.style.setProperty('--dy', Math.sin(angle) * velocity + 'px');

        container.appendChild(particle);
        setTimeout(() => particle.remove(), 1000);
      }
    }

    // Add particle animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes particle-move {
        0% {
          transform: translate(0, 0);
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx), var(--dy));
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    // Update stats
    function updateStats() {
      const accuracy = stats.totalClicks > 0
        ? Math.round((stats.successfulClicks / stats.totalClicks) * 100)
        : 0;

      document.getElementById('accuracyStat').textContent = accuracy + '%';
      document.getElementById('missStat').textContent = stats.missClicks;
      document.getElementById('hermesCallsStat').textContent = stats.hermesCalls;
      document.getElementById('timeSavedStat').textContent = stats.timeSaved + 's';
    }

    // Reset demo
    function resetDemo() {
      stats = {
        totalClicks: 0,
        successfulClicks: 0,
        missClicks: 0,
        hermesCalls: 0,
        timeSaved: 0
      };
      updateStats();
      document.getElementById('terminalContent').innerHTML = '';
      addTerminalLine('🔄 Demo reset');
    }

    // Detect actual miss clicks
    document.addEventListener('click', (e) => {
      // If clicked on empty space
      if (e.target === document.body || e.target.classList.contains('demo-side')) {
        if (tremorEnabled) {
          stats.missClicks++;
          stats.totalClicks++;
          updateStats();
          showMissClick({ getBoundingClientRect: () => ({
            left: e.clientX - 15,
            top: e.clientY - 15,
            width: 30,
            height: 30
          })});
          addTerminalLine('❌ Miss-click on empty space');
        }
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 't') toggleTremor();
      if (e.key === 'r') resetDemo();
    });
  </script>
</body>
</html>
